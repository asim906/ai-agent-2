openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WhatsApp AI Automation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: whatsapp
    description: WhatsApp connection and messaging
  - name: chats
    description: Chat management
  - name: messages
    description: Message operations
  - name: ai-settings
    description: AI model configuration
  - name: memory
    description: AI memory and training data
  - name: tools
    description: AI tools (CSV, knowledge)
  - name: analytics
    description: Usage analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /whatsapp/status:
    get:
      tags: [whatsapp]
      operationId: getWhatsappStatus
      summary: Get WhatsApp connection status
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatsappStatus'

  /whatsapp/qr:
    get:
      tags: [whatsapp]
      operationId: getWhatsappQr
      summary: Get QR code for WhatsApp connection
      responses:
        '200':
          description: QR code data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatsappQr'

  /whatsapp/disconnect:
    post:
      tags: [whatsapp]
      operationId: disconnectWhatsapp
      summary: Disconnect WhatsApp session
      responses:
        '200':
          description: Disconnected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /chats:
    get:
      tags: [chats]
      operationId: listChats
      summary: List all WhatsApp chats
      responses:
        '200':
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'

  /chats/{chatId}:
    get:
      tags: [chats]
      operationId: getChat
      summary: Get a single chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'

  /chats/{chatId}/messages:
    get:
      tags: [messages]
      operationId: listMessages
      summary: List messages for a chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'

  /chats/{chatId}/send:
    post:
      tags: [messages]
      operationId: sendMessage
      summary: Send a message to a chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /ai-settings:
    get:
      tags: [ai-settings]
      operationId: getAiSettings
      summary: Get AI model settings
      responses:
        '200':
          description: AI settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSettings'

    put:
      tags: [ai-settings]
      operationId: updateAiSettings
      summary: Update AI model settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiSettingsRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSettings'

  /memory/chats:
    get:
      tags: [memory]
      operationId: getMemoryChats
      summary: Get chat memory summary
      responses:
        '200':
          description: Memory stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemorySummary'

  /memory/custom:
    get:
      tags: [memory]
      operationId: listCustomMemory
      summary: List custom memory entries
      responses:
        '200':
          description: List of custom memory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomMemory'

    post:
      tags: [memory]
      operationId: createCustomMemory
      summary: Create a custom memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomMemoryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomMemory'

  /memory/custom/{id}:
    put:
      tags: [memory]
      operationId: updateCustomMemory
      summary: Update a custom memory entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomMemoryRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomMemory'

    delete:
      tags: [memory]
      operationId: deleteCustomMemory
      summary: Delete a custom memory entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /tools/csv:
    get:
      tags: [tools]
      operationId: listCsvFiles
      summary: List uploaded CSV/Excel files
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsvFile'

    post:
      tags: [tools]
      operationId: uploadCsvFile
      summary: Upload a CSV or Excel file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCsvRequest'
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvFile'

  /tools/csv/{id}:
    delete:
      tags: [tools]
      operationId: deleteCsvFile
      summary: Delete a CSV file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /analytics/summary:
    get:
      tags: [analytics]
      operationId: getAnalyticsSummary
      summary: Get overall analytics summary
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummary'

  /analytics/daily:
    get:
      tags: [analytics]
      operationId: getDailyAnalytics
      summary: Get daily analytics for last 30 days
      responses:
        '200':
          description: Daily analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyAnalytics'

  /automation/toggle:
    post:
      tags: [whatsapp]
      operationId: toggleAutomation
      summary: Enable or disable automation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleAutomationRequest'
      responses:
        '200':
          description: Automation status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationStatus'

  /automation/status:
    get:
      tags: [whatsapp]
      operationId: getAutomationStatus
      summary: Get automation status
      responses:
        '200':
          description: Automation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationStatus'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    WhatsappStatus:
      type: object
      required: [connected, phoneNumber, automationEnabled]
      properties:
        connected:
          type: boolean
        phoneNumber:
          type: [string, 'null']
        automationEnabled:
          type: boolean
        lastConnected:
          type: [string, 'null']

    WhatsappQr:
      type: object
      required: [qr, expiresAt]
      properties:
        qr:
          type: [string, 'null']
        expiresAt:
          type: [string, 'null']

    Chat:
      type: object
      required: [id, name, lastMessage, lastMessageAt, unreadCount, isGroup]
      properties:
        id:
          type: string
        name:
          type: string
        phoneNumber:
          type: [string, 'null']
        profilePicUrl:
          type: [string, 'null']
        lastMessage:
          type: [string, 'null']
        lastMessageAt:
          type: [string, 'null']
        unreadCount:
          type: integer
        isGroup:
          type: boolean

    Message:
      type: object
      required: [id, chatId, content, fromMe, timestamp, type]
      properties:
        id:
          type: string
        chatId:
          type: string
        content:
          type: string
        fromMe:
          type: boolean
        timestamp:
          type: string
        type:
          type: string
          enum: [text, image, document, audio, video]
        isAiGenerated:
          type: boolean
        senderName:
          type: [string, 'null']

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    AiSettings:
      type: object
      required: [provider, model, temperature, autoReply]
      properties:
        provider:
          type: string
          enum: [openai, openrouter, gemini]
        model:
          type: string
        apiKey:
          type: [string, 'null']
        temperature:
          type: number
        maxTokens:
          type: integer
        autoReply:
          type: boolean
        systemPrompt:
          type: [string, 'null']

    UpdateAiSettingsRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [openai, openrouter, gemini]
        model:
          type: string
        apiKey:
          type: [string, 'null']
        temperature:
          type: number
        maxTokens:
          type: integer
        autoReply:
          type: boolean
        systemPrompt:
          type: [string, 'null']

    MemorySummary:
      type: object
      required: [totalConversations, totalMessages, storageUsed]
      properties:
        totalConversations:
          type: integer
        totalMessages:
          type: integer
        storageUsed:
          type: string

    CustomMemory:
      type: object
      required: [id, question, answer, createdAt]
      properties:
        id:
          type: string
        question:
          type: string
        answer:
          type: string
        category:
          type: [string, 'null']
        createdAt:
          type: string

    CreateCustomMemoryRequest:
      type: object
      required: [question, answer]
      properties:
        question:
          type: string
          minLength: 1
        answer:
          type: string
          minLength: 1
        category:
          type: [string, 'null']

    CsvFile:
      type: object
      required: [id, filename, rowCount, uploadedAt]
      properties:
        id:
          type: string
        filename:
          type: string
        rowCount:
          type: integer
        uploadedAt:
          type: string
        description:
          type: [string, 'null']

    UploadCsvRequest:
      type: object
      required: [filename, data]
      properties:
        filename:
          type: string
        data:
          type: string
          description: Base64 encoded file content
        description:
          type: [string, 'null']

    AnalyticsSummary:
      type: object
      required: [totalMessages, totalSent, totalReceived, totalChats, aiResponses, successRate]
      properties:
        totalMessages:
          type: integer
        totalSent:
          type: integer
        totalReceived:
          type: integer
        totalChats:
          type: integer
        aiResponses:
          type: integer
        successRate:
          type: number

    DailyAnalytics:
      type: object
      required: [date, sent, received, aiResponses]
      properties:
        date:
          type: string
        sent:
          type: integer
        received:
          type: integer
        aiResponses:
          type: integer

    ToggleAutomationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    AutomationStatus:
      type: object
      required: [enabled, processedToday]
      properties:
        enabled:
          type: boolean
        processedToday:
          type: integer
